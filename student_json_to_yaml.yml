---
- name: JSON ↔ YAML Convert and Push
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    repo_url: https://rajputgagan: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@github.com/rajputgagan/Student.git
    repo_path: /tmp/myrepo
    venv_path: /tmp/venv
    git_branch: main

  tasks:

    - name: Install system packages
      raw: apk add --no-cache python3 git py3-virtualenv
      changed_when: false
      failed_when: false

    - name: Remove old repo
      file:
        path: "{{ repo_path }}"
        state: absent

    - name: Clone repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_path }}"
        version: "{{ git_branch }}"
        force: yes

    - name: Create virtual environment
      command: python3 -m venv {{ venv_path }}

    - name: Install PyYAML inside venv
      command: "{{ venv_path }}/bin/pip install pyyaml"

    - name: Set git username
      command: git config user.name "rajputgagan"
      args:
        chdir: "{{ repo_path }}"

    - name: Set git email
      command: git config user.email "gr9582730@gmail.com"
      args:
        chdir: "{{ repo_path }}"

    - name: Pull latest
      command: git pull --rebase origin {{ git_branch }}
      args:
        chdir: "{{ repo_path }}"

    - name: Convert JSON → YAML
      command: >
        {{ venv_path }}/bin/python convert.py
        json2yaml
        munendra.json
        output.yaml
      args:
        chdir: "{{ repo_path }}"

    - name: Convert YAML → JSON
      command: >
        {{ venv_path }}/bin/python convert.py
        yaml2json
        priyanka.yaml
        output.json
      args:
        chdir: "{{ repo_path }}"

    - name: Git add
      command: git add .
      args:
        chdir: "{{ repo_path }}"

    - name: Check changes
      shell: git diff --cached --quiet
      args:
        chdir: "{{ repo_path }}"
      register: git_diff
      failed_when: false
      changed_when: false

    - name: Commit
      command: git commit -m "Auto convert JSON ↔ YAML via AWX"
      args:
        chdir: "{{ repo_path }}"
      when: git_diff.rc != 0

    - name: Push
      command: git push origin {{ git_branch }}
      args:
        chdir: "{{ repo_path }}"
      when: git_diff.rc != 0

    - name: Done
      debug:
        msg: "✅ Everything successful!"
