---
- name: JSON ↔ YAML Convert and Push
  hosts: localhost
  connection: local
  gather_facts: no
  become: no

  vars:
    git_branch: main
    git_user_name: rajputgagan
    git_user_email: gr9582730@gmail.com

  tasks:

    - name: Ensure python3 git yaml installed
      raw: apk add --no-cache python3 git py3-yaml
      changed_when: false
      failed_when: false

    - name: Check repo directory
      command: ls -la
      args:
        chdir: "{{ playbook_dir }}"

    - name: Set git username
      command: git config user.name "{{ git_user_name }}"
      args:
        chdir: "{{ playbook_dir }}"

    - name: Set git email
      command: git config user.email "{{ git_user_email }}"
      args:
        chdir: "{{ playbook_dir }}"

    - name: Pull latest code
      command: git pull --rebase origin {{ git_branch }}
      args:
        chdir: "{{ playbook_dir }}"

    - name: Convert JSON to YAML
      command: >
        python3 convert.py
        json2yaml
        munendra.json
        output.yaml
      args:
        chdir: "{{ playbook_dir }}"
      register: json_to_yaml

    - name: Show JSON → YAML result
      debug:
        var: json_to_yaml.stdout

    - name: Convert YAML to JSON
      command: >
        python3 convert.py
        yaml2json
        priyanka.yaml
        output.json
      args:
        chdir: "{{ playbook_dir }}"
      register: yaml_to_json

    - name: Show YAML → JSON result
      debug:
        var: yaml_to_json.stdout

    - name: Git add all files
      command: git add .
      args:
        chdir: "{{ playbook_dir }}"

    - name: Check if changes exist
      shell: git diff --cached --quiet
      args:
        chdir: "{{ playbook_dir }}"
      register: git_diff
      failed_when: false
      changed_when: false

    - name: Commit changes
      command: git commit -m "Auto convert JSON ↔ YAML via AWX"
      args:
        chdir: "{{ playbook_dir }}"
      when: git_diff.rc != 0

    - name: Push to GitHub
      command: git push origin {{ git_branch }}
      args:
        chdir: "{{ playbook_dir }}"
      when: git_diff.rc != 0

    - name: No changes message
      debug:
        msg: "No changes to commit"
      when: git_diff.rc == 0

    - name: Done
      debug:
        msg: "✅ Conversion + Git Push completed successfully!"
