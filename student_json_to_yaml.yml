---
- name: JSON ↔ YAML Convert and Push
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    git_branch: main

  tasks:

    - name: Show current path
      command: pwd
      register: pwd_out

    - debug:
        var: pwd_out.stdout

    - name: List files
      command: ls -la
      register: ls_out

    - debug:
        var: ls_out.stdout

    - name: Set git username
      shell: git config user.name "rajputgagan"
      args:
        chdir: "{{ playbook_dir }}"

    - name: Set git email
      shell: git config user.email "gr9582730@gmail.com"
      args:
        chdir: "{{ playbook_dir }}"

    - name: Pull latest
      shell: git pull --rebase origin main
      args:
        chdir: "{{ playbook_dir }}"

    - name: Convert JSON → YAML
      shell: python3 convert.py json2yaml munendra.json output.yaml
      args:
        chdir: "{{ playbook_dir }}"

    - name: Convert YAML → JSON
      shell: python3 convert.py yaml2json priyanka.yaml output.json
      args:
        chdir: "{{ playbook_dir }}"

    - name: Git add
      shell: git add .
      args:
        chdir: "{{ playbook_dir }}"

    - name: Commit if changes
      shell: git diff --cached --quiet || git commit -m "Auto convert via AWX"
      args:
        chdir: "{{ playbook_dir }}"

    - name: Push
      shell: git push origin main
      args:
        chdir: "{{ playbook_dir }}"
