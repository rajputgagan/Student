---
- name: JSON ↔ YAML Convert and Push
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    git_branch: main

  tasks:

    - name: Debug repo path
      command: ls -la
      args:
        chdir: /runner/project

    - name: Set git username
      command: git config user.name "rajputgagan"
      args:
        chdir: /runner/project

    - name: Set git email
      command: git config user.email "gr9582730@gmail.com"
      args:
        chdir: /runner/project

    - name: Pull latest code
      command: git pull --rebase origin main
      args:
        chdir: /runner/project

    - name: Convert JSON to YAML
      command: python3 convert.py json2yaml munendra.json output.yaml
      args:
        chdir: /runner/project

    - name: Convert YAML to JSON
      command: python3 convert.py yaml2json priyanka.yaml output.json
      args:
        chdir: /runner/project

    - name: Git add
      command: git add .
      args:
        chdir: /runner/project

    - name: Check changes
      shell: git diff --cached --quiet
      args:
        chdir: /runner/project
      register: git_diff
      failed_when: false
      changed_when: false

    - name: Commit
      command: git commit -m "Auto convert via AWX"
      args:
        chdir: /runner/project
      when: git_diff.rc != 0

    - name: Push
      command: git push origin main
      args:
        chdir: /runner/project
      when: git_diff.rc != 0
