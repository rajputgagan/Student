---
- name: JSON ↔ YAML Convert and Push
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    github_username: "rajputgagan"
    github_token: "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"
    github_email: "gr9582730@gmail.com"

    repo_https_url: "https://github.com/rajputgagan/Student.git"
    repo_auth_url: "https://{{ github_username }}:{{ github_token }}@github.com/rajputgagan/Student.git"
    repo_path: "/tmp/myrepo"
    venv_path: "/tmp/venv"
    git_branch: "main"

  tasks:
    - name: Install system packages for Alpine
      raw: apk add --no-cache python3 git py3-virtualenv
      changed_when: false
      failed_when: false

    - name: Remove old repo
      file:
        path: "{{ repo_path }}"
        state: absent

    - name: Remove old virtualenv
      file:
        path: "{{ venv_path }}"
        state: absent

    - name: Clone repo
      git:
        repo: "{{ repo_https_url }}"
        dest: "{{ repo_path }}"
        version: "{{ git_branch }}"
        force: yes

    - name: Configure git username
      command: git config user.name "{{ github_username }}"
      args:
        chdir: "{{ repo_path }}"

    - name: Configure git email
      command: git config user.email "{{ github_email }}"
      args:
        chdir: "{{ repo_path }}"

    - name: Show current origin
      command: git remote get-url origin
      args:
        chdir: "{{ repo_path }}"
      register: origin_before
      changed_when: false

    - name: Print current origin
      debug:
        var: origin_before.stdout

    - name: Create virtual environment
      command: python3 -m venv {{ venv_path }}

    - name: Install PyYAML in virtual environment
      command: "{{ venv_path }}/bin/pip install pyyaml"

    - name: Convert JSON to YAML
      command: >
        {{ venv_path }}/bin/python convert.py
        json2yaml
        munendra.json
        output.yaml
      args:
        chdir: "{{ repo_path }}"

    - name: Convert YAML to JSON
      command: >
        {{ venv_path }}/bin/python convert.py
        yaml2json
        priyanka.yaml
        output.json
      args:
        chdir: "{{ repo_path }}"

    - name: Git add all files
      command: git add .
      args:
        chdir: "{{ repo_path }}"

    - name: Check for staged changes
      shell: git diff --cached --quiet
      args:
        chdir: "{{ repo_path }}"
      register: git_diff
      failed_when: false
      changed_when: false

    - name: Commit changes
      command: git commit -m "Auto convert JSON ↔ YAML via AWX"
      args:
        chdir: "{{ repo_path }}"
      when: git_diff.rc != 0

    - name: Push changes using authenticated URL
      command: git push "{{ repo_auth_url }}" "{{ git_branch }}"
      args:
        chdir: "{{ repo_path }}"
      when: git_diff.rc != 0

    - name: No changes found
      debug:
        msg: "No changes detected, nothing to commit or push."
      when: git_diff.rc == 0

    - name: Final success message
      debug:
        msg: "✅ JSON ↔ YAML conversion and Git push completed successfully."
